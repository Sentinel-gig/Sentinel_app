<style>
* { box-sizing: border-box; }
#sentinel-panel {
  position: fixed; top: 16px; left: 16px; z-index: 9999;
  width: 300px; font-family: 'DM Sans', sans-serif;
}
#sentinel-header {
  background: linear-gradient(135deg, #0d0d14, #12121f);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px 14px 0 0;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 0 40px rgba(220,38,38,0.12);
}
#panel-body {
  background: rgba(10,10,18,0.96);
  border: 1px solid rgba(255,255,255,0.07);
  border-top: none;
  border-radius: 0 0 14px 14px;
  padding: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.s-label {
  font-size: 10px; color: rgba(255,255,255,0.35);
  letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px;
}
.s-input {
  width: 100%; padding: 9px 10px 9px 30px;
  border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05); color: white;
  font-size: 12px; font-family: 'DM Sans', sans-serif;
  outline: none; transition: border 0.2s;
}
.s-input:focus { border-color: rgba(220,38,38,0.5); }
.s-sug {
  position: absolute; left: 0; right: 0; z-index: 99999;
  background: #0d0d18; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 0 0 8px 8px; max-height: 130px; overflow-y: auto;
}
.s-sug-item {
  padding: 8px 12px; font-size: 11px; cursor: pointer;
  color: rgba(255,255,255,0.7); border-bottom: 1px solid rgba(255,255,255,0.05);
}
.s-sug-item:hover { background: rgba(220,38,38,0.15); }
.s-btn {
  width: 100%; padding: 10px; border: none; border-radius: 9px;
  cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 700;
  font-size: 13px; letter-spacing: 0.5px; color: white; margin-bottom: 6px;
  background: linear-gradient(135deg, #dc2626, #991b1b);
  box-shadow: 0 4px 20px rgba(220,38,38,0.35);
  transition: all 0.2s;
}
.s-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 25px rgba(220,38,38,0.5); }
.s-btn-clear {
  width: 100%; padding: 8px; border-radius: 8px; cursor: pointer;
  background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.5);
  border: 1px solid rgba(255,255,255,0.08); font-size: 12px;
  font-family: 'DM Sans', sans-serif; transition: all 0.2s;
}
.s-btn-clear:hover { background: rgba(255,255,255,0.09); }
.s-status {
  display: none; margin-top: 10px; padding: 8px 10px;
  border-radius: 7px; font-size: 11px;
}
.route-card {
  margin-top: 6px; padding: 9px 11px; border-radius: 8px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  font-size: 11px; cursor: pointer; transition: background 0.2s;
}
.route-card:hover { background: rgba(255,255,255,0.06); }
.s-legend {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; gap: 10px; justify-content: center;
}
.s-legend-item {
  display: flex; align-items: center; gap: 4px;
  font-size: 10px; color: rgba(255,255,255,0.4);
}
.s-dot {
  width: 8px; height: 8px; border-radius: 50%;
}
#risk-badge {
  display: none; position: fixed; top: 16px; right: 60px; z-index: 9999;
  font-family: 'Syne', sans-serif; font-weight: 700;
  padding: 10px 18px; border-radius: 10px; font-size: 13px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4); letter-spacing: 0.5px;
}
</style>

let startCoords = null, endCoords = null;
let startMarker = null, endMarker = null;
let routeLayers = [];
let searchTimers = {};

function togglePanel() {
  const b = document.getElementById('panel-body');
  const btn = document.getElementById('toggle-btn');
  if (b.style.display === 'none') { b.style.display = 'block'; btn.textContent = '-'; }
  else { b.style.display = 'none'; btn.textContent = '+'; }
}

// ── SEARCH ────────────────────────────────────────────────────
async function searchPlace(type) {
  const val = document.getElementById(type + '-search').value.trim();
  const sug = document.getElementById(type + '-sug');
  if (val.length < 3) { sug.innerHTML = ''; return; }
  clearTimeout(searchTimers[type]);
  searchTimers[type] = setTimeout(async () => {
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(val)}&format=json&limit=5&countrycodes=in`,
        { headers: { 'Accept-Language': 'en' } }
      );
      const data = await res.json();
      sug.innerHTML = '';
      data.forEach(r => {
        const d = document.createElement('div');
        d.className = 's-sug-item';
        d.textContent = r.display_name.split(',').slice(0, 3).join(', ');
        d.onclick = () => {
          document.getElementById(type + '-search').value = d.textContent;
          sug.innerHTML = '';
          const lat = parseFloat(r.lat), lng = parseFloat(r.lon);
          if (type === 'start') {
            startCoords = [lat, lng];
            if (startMarker) map_obj.removeLayer(startMarker);
            startMarker = L.marker([lat, lng]).bindPopup('<b>Start</b>').addTo(map_obj);
            map_obj.setView([lat, lng], 14);
            setStatus('Start set — now select destination', '#3b82f6');
          } else {
            endCoords = [lat, lng];
            if (endMarker) map_obj.removeLayer(endMarker);
            endMarker = L.marker([lat, lng], { icon: redIcon() }).bindPopup('<b>Destination</b>').addTo(map_obj);
            map_obj.setView([lat, lng], 14);
            setStatus('Destination set — click Find Safest Route', '#10b981');
          }
        };
        sug.appendChild(d);
      });
    } catch(e) {}
  }, 400);
}

function redIcon() {
  return L.icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
    iconSize: [25, 41], iconAnchor: [12, 41]
  });
}

// ── RISK SCORING ──────────────────────────────────────────────
function scoreRoute(coords) {
  let score = 0;
  const warnings = new Set();
  const counted = new Set();
  coords.forEach(([lng, lat]) => {
    ZONES.forEach(z => {
      if (counted.has(z.name)) return;
      const dist = Math.sqrt((lat - z.lat) ** 2 + (lng - z.lng) ** 2);
      if (dist < 0.005) {
        score += z.score;
        warnings.add(z.name);
        counted.add(z.name);
      }
    });
  });
  return { score, warnings: [...warnings] };
}

function getRouteColor(s) { return s >= 30 ? '#dc2626' : s >= 15 ? '#f59e0b' : '#10b981'; }
function getRouteLabel(s) { return s >= 30 ? 'DANGEROUS' : s >= 15 ? 'MODERATE' : 'SAFE'; }

// ── ROUTE PLANNING ────────────────────────────────────────────
async function planRoute() {
  if (!startCoords || !endCoords) {
    setStatus('Set both locations first', '#dc2626'); return;
  }
  setStatus('Calculating routes...', '#f59e0b');
  clearRouteLayers();
  document.getElementById('route-cards').innerHTML = '';

  const [sLat, sLng] = startCoords;
  const [eLat, eLng] = endCoords;

  try {
    const res = await fetch(
      `https://router.project-osrm.org/route/v1/driving/${sLng},${sLat};${eLng},${eLat}?alternatives=3&geometries=geojson&overview=full`
    );
    const data = await res.json();

    if (!data.routes || !data.routes.length) {
      setStatus('No routes found', '#dc2626'); return;
    }

    const scored = data.routes.map((r, i) => {
      const coords = r.geometry.coordinates;
      const { score, warnings } = scoreRoute(coords);
      return {
        i, coords, score, warnings,
        color: getRouteColor(score),
        label: getRouteLabel(score),
        dist: (r.distance / 1000).toFixed(1),
        dur: Math.round(r.duration / 60)
      };
    });

    scored.sort((a, b) => a.score - b.score);

    scored.forEach((r, rank) => {
      const latlngs = r.coords.map(([lng, lat]) => [lat, lng]);
      const isBest = rank === 0;

      const line = L.polyline(latlngs, {
        color: r.color,
        weight: isBest ? 7 : 4,
        opacity: isBest ? 0.95 : 0.5,
        dashArray: isBest ? null : '10,6'
      }).bindPopup(
        `<b>Route ${r.i + 1}</b><br>
         <span style="color:${r.color};font-weight:bold">${r.label}</span><br>
         ${r.dist} km · ${r.dur} min<br>
         ${r.warnings.length ? 'Near: ' + r.warnings.slice(0, 3).join(', ') : 'No risk zones'}<br>
         ${isBest ? '<b>RECOMMENDED</b>' : ''}`
      ).addTo(map_obj);
      routeLayers.push(line);

      const card = document.createElement('div');
      card.className = 'route-card';
      card.style.borderLeft = `3px solid ${r.color}`;
      card.innerHTML = `
        <div style="font-family:'Syne',sans-serif;font-weight:700;color:${r.color};font-size:12px;margin-bottom:3px;">
          ${isBest ? '⭐ ' : ''}Route ${r.i + 1} — ${r.label}
        </div>
        <div style="color:rgba(255,255,255,0.5);">${r.dist} km · ${r.dur} min</div>
        <div style="color:rgba(255,255,255,0.4);margin-top:2px;">
          ${r.warnings.length ? '⚠️ ' + r.warnings.slice(0, 2).join(', ') : '✅ Clear path'}
        </div>`;
      card.onclick = () => map_obj.fitBounds(line.getBounds(), { padding: [40, 40] });
      document.getElementById('route-cards').appendChild(card);
    });

    map_obj.fitBounds(routeLayers[0].getBounds(), { padding: [60, 60] });
    setStatus('Routes calculated', '#10b981');

  } catch(e) {
    setStatus('Error: ' + e.message, '#dc2626');
  }
}

function clearRouteLayers() {
  routeLayers.forEach(l => map_obj.removeLayer(l));
  routeLayers = [];
}

function clearAll() {
  clearRouteLayers();
  if (startMarker) { map_obj.removeLayer(startMarker); startMarker = null; }
  if (endMarker)   { map_obj.removeLayer(endMarker);   endMarker   = null; }
  document.getElementById('start-search').value = '';
  document.getElementById('end-search').value   = '';
  document.getElementById('route-status').style.display = 'none';
  document.getElementById('route-cards').innerHTML = '';
  startCoords = null; endCoords = null;
}

function setStatus(msg, color) {
  const s = document.getElementById('route-status');
  s.style.display = 'block';
  s.style.background = color + '18';
  s.style.color = color;
  s.style.border = '1px solid ' + color + '44';
  s.innerHTML = msg;
}

// ── AUTO LOCATION ─────────────────────────────────────────────
function getNearbyRisk(lat, lng) {
  let score = 0;
  const counted = new Set();
  ZONES.forEach(z => {
    if (counted.has(z.name)) return;
    const dist = Math.sqrt((lat - z.lat) ** 2 + (lng - z.lng) ** 2);
    if (dist < 0.15) { score += z.score; counted.add(z.name); }
  });
  return score;
}

function showRiskBadge(score) {
  const badge = document.getElementById('risk-badge');
  const color = score >= 30 ? '#b91c1c' : score >= 15 ? '#dc2626' : score >= 6 ? '#f59e0b' : '#10b981';
  const label = score >= 30 ? 'CRITICAL' : score >= 15 ? 'HIGH' : score >= 6 ? 'MODERATE' : 'SAFE';
  badge.style.display = 'block';
  badge.style.background = color + '22';
  badge.style.color = color;
  badge.style.border = '1px solid ' + color + '66';
  badge.innerHTML = 'Your Area: <b>' + label + '</b>';
}

function initLocation() {
  const keys = Object.keys(window).filter(k => k.startsWith('map_'));
  if (!keys.length) { setTimeout(initLocation, 200); return; }
  window.map_obj = window[keys[0]];

  if (!navigator.geolocation) {
    document.getElementById('location-status').textContent = 'Not supported';
    return;
  }

  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude, lng = pos.coords.longitude;
    const s = document.getElementById('location-status');
    s.textContent = 'Located';
    s.style.color = '#10b981';

    window.map_obj.flyTo([lat, lng], 13, { animate: true, duration: 1.5 });

    L.circleMarker([lat, lng], {
      radius: 9, color: '#ffffff', fillColor: '#3b82f6',
      fillOpacity: 1, weight: 2, interactive: false
    }).addTo(window.map_obj);

    L.circleMarker([lat, lng], {
      radius: 22, color: '#3b82f6', fillOpacity: 0,
      weight: 1.5, opacity: 0.35, interactive: false
    }).addTo(window.map_obj);

    L.circle([lat, lng], {
      radius: 50000, color: '#3b82f6', fillOpacity: 0.02,
      weight: 1, dashArray: '6,8', opacity: 0.25, interactive: false
    }).addTo(window.map_obj);

    showRiskBadge(getNearbyRisk(lat, lng));

  }, err => {
    document.getElementById('location-status').textContent = 'Denied';
    document.getElementById('location-status').style.color = '#ef4444';
  }, { enableHighAccuracy: true, timeout: 10000 });
}

// Map click fallback
setTimeout(() => {
  const keys = Object.keys(window).filter(k => k.startsWith('map_'));
  if (keys.length) window.map_obj = window[keys[0]];

  map_obj.on('click', e => {
    if (!startCoords) {
      startCoords = [e.latlng.lat, e.latlng.lng];
      if (startMarker) map_obj.removeLayer(startMarker);
      startMarker = L.marker(startCoords).bindPopup('Start').addTo(map_obj);
      document.getElementById('start-search').value =
        e.latlng.lat.toFixed(5) + ', ' + e.latlng.lng.toFixed(5);
      setStatus('Start set! Now tap End location', '#3b82f6');
    } else if (!endCoords) {
      endCoords = [e.latlng.lat, e.latlng.lng];
      if (endMarker) map_obj.removeLayer(endMarker);
      endMarker = L.marker(endCoords, { icon: redIcon() }).bindPopup('End').addTo(map_obj);
      document.getElementById('end-search').value =
        e.latlng.lat.toFixed(5) + ', ' + e.latlng.lng.toFixed(5);
      setStatus('End set! Click Find Safest Route', '#10b981');
    }
  });
}, 800);

window.addEventListener('load', () => setTimeout(initLocation, 1000));
