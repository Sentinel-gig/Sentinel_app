<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Sentinel Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #080d18;
      }
      #map {
        width: 100%;
        height: 100%;
      }
      #loading {
        position: fixed;
        inset: 0;
        background: #080d18;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        z-index: 9999;
      }
      .load-bar {
        width: 120px;
        height: 2px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 1px;
        overflow: hidden;
      }
      .load-fill {
        height: 100%;
        background: rgba(79, 142, 247, 0.7);
        border-radius: 1px;
        animation: loadanim 1.5s ease-in-out infinite;
      }
      @keyframes loadanim {
        0% {
          width: 0%;
          margin-left: 0;
        }
        50% {
          width: 60%;
          margin-left: 20%;
        }
        100% {
          width: 0%;
          margin-left: 100%;
        }
      }
      #controls {
        position: fixed;
        bottom: 16px;
        right: 16px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .ctrl-btn {
        background: rgba(10, 10, 18, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: white;
        padding: 8px 14px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 700;
        font-family: sans-serif;
        letter-spacing: 0.5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div
        style="
          color: white;
          font-family: sans-serif;
          font-size: 18px;
          font-weight: 800;
          letter-spacing: 3px;
        "
      >
        SENTINEL
      </div>
      <div class="load-bar"><div class="load-fill"></div></div>
      <div
        style="
          color: rgba(255, 255, 255, 0.4);
          font-family: sans-serif;
          font-size: 12px;
          letter-spacing: 2px;
        "
      >
        LOADING MAP
      </div>
    </div>

    <div id="map"></div>

    <div id="controls">
      <button class="ctrl-btn" onclick="toggleLabels()" id="label-btn">
        LABELS OFF
      </button>
      <button class="ctrl-btn" onclick="toggleFullscreen()">
        ⛶ FULLSCREEN
      </button>
    </div>

    <script>
      const RISK_COLORS = {
        CRITICAL: "#EF4444",
        HIGH: "#EF4444",
        MODERATE: "#FFFFFF",
        SAFE: "#22C55E",
      };

      let map, userMarker;
      let riskCircles = [];
      let labelMarkers = [];
      let routeLayers = [];
      let labelsVisible = false;
      let isFullscreen = false;
      let userLat = 26.4499,
        userLng = 80.3319;
      let _mapReady = false;
      let _pendingMap = null;

      function initMap() {
        map = L.map("map", {
          center: [userLat, userLng],
          zoom: 13,
          zoomControl: false,
          attributionControl: false,
        });

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
        }).addTo(map);

        userMarker = L.circleMarker([userLat, userLng], {
          radius: 10,
          fillColor: "#4F8EF7",
          color: "rgba(79,142,247,0.3)",
          weight: 8,
          fillOpacity: 1,
        }).addTo(map);

        L.circleMarker([userLat, userLng], {
          radius: 20,
          fillColor: "transparent",
          color: "#4F8EF7",
          weight: 1,
          fillOpacity: 0,
          opacity: 0.3,
        }).addTo(map);

        document.getElementById("loading").style.display = "none";
        _mapReady = true;

        if (_pendingMap) {
          _drawMapData(_pendingMap);
          _pendingMap = null;
        }
      }

      function _drawMapData(data) {
        if (data.zones) drawRiskZones(data.zones);
        if (data.no_data) drawNoDataZones(data.no_data);
        if (data.hotspots) drawHotspots(data.hotspots);
      }

      function drawRiskZones(zones) {
        window._allZones = zones;
        riskCircles.forEach((c) => map.removeLayer(c));
        riskCircles = [];
        zones.forEach((zone) => {
          const color = RISK_COLORS[zone.label] || RISK_COLORS.SAFE;
          const c = L.circleMarker([zone.lat, zone.lng], {
            radius: 8,
            fillColor: color,
            fillOpacity: 0.9,
            color: "#000",
            weight: 1,
            opacity: 1,
          })
            .bindPopup(
              `<b>${zone.locality}</b><br><span style="color:${color};font-weight:bold">${zone.label}</span><br>${zone.total_incidents} incidents`,
            )
            .addTo(map);
          riskCircles.push(c);
        });
      }

      function drawNoDataZones(zones) {
        window._noDataZones = zones;
        zones.forEach((zone) => {
          L.circleMarker([zone.lat, zone.lng], {
            radius: 6,
            fillColor: "#3B82F6",
            fillOpacity: 0.9,
            color: "#000",
            weight: 1,
            opacity: 1,
          })
            .bindPopup(
              `<b>${zone.locality}</b><br><span style="color:#3B82F6;font-weight:bold">NO DATA</span>`,
            )
            .addTo(map);
        });
      }

      function drawHotspots(hotspots) {
        hotspots.forEach((h) => {
          L.circle([h.lat, h.lng], {
            radius: 500,
            fillColor: "#FF0000",
            fillOpacity: 0.25,
            color: "#FF0000",
            weight: 2,
            opacity: 0.8,
          }).addTo(map);
        });
      }

      function updateLocation(lat, lng) {
        userLat = lat;
        userLng = lng;
        if (userMarker) userMarker.setLatLng([lat, lng]);
        map.setView([lat, lng], 13);
      }

      function toggleLabels() {
        labelsVisible = !labelsVisible;
        document.getElementById("label-btn").textContent = labelsVisible
          ? "LABELS ON"
          : "LABELS OFF";
        if (labelsVisible) {
          (window._allZones || []).forEach((zone) => {
            const color = RISK_COLORS[zone.label] || RISK_COLORS.SAFE;
            labelMarkers.push(
              L.marker([zone.lat, zone.lng], {
                icon: L.divIcon({
                  className: "",
                  html: `<div style="background:rgba(0,0,0,0.7);color:${color};padding:2px 6px;border-radius:6px;font-size:9px;font-weight:700;font-family:sans-serif;white-space:nowrap;">${zone.locality}</div>`,
                  iconAnchor: [0, 0],
                }),
              }).addTo(map),
            );
          });
        } else {
          labelMarkers.forEach((m) => map.removeLayer(m));
          labelMarkers = [];
        }
      }

      function toggleFullscreen() {
        isFullscreen = !isFullscreen;
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(
            JSON.stringify({ type: "toggleFullscreen", value: isFullscreen }),
          );
        }
      }

      function drawRoutes(origin, destination, routes) {
        routeLayers.forEach((l) => map.removeLayer(l));
        routeLayers = [];
        const RC = { safe: "#22C55E", balanced: "#F59E0B", fast: "#EF4444" };
        routes.forEach((route) => {
          const line = L.polyline(route.coords, {
            color: RC[route.type] || "#4F8EF7",
            weight: route.selected ? 4 : 2.5,
            opacity: route.selected ? 0.9 : 0.4,
            dashArray: route.type === "fast" ? "8,6" : null,
          }).addTo(map);
          routeLayers.push(line);
        });
      }

      function selectRoute(type) {
        const types = ["safe", "balanced", "fast"];
        routeLayers.forEach((line, i) => {
          const sel = types[i] === type;
          line.setStyle({ weight: sel ? 5 : 2, opacity: sel ? 1 : 0.25 });
        });
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(
            JSON.stringify({ type: "routeSelected", route: type }),
          );
        }
      }

      window.receiveMessage = function (data) {
        const msg = typeof data === "string" ? JSON.parse(data) : data;
        switch (msg.type) {
          case "setLocation":
            updateLocation(msg.lat, msg.lng);
            break;
          case "mapData":
            if (_mapReady) _drawMapData(msg.data);
            else _pendingMap = msg.data;
            break;
          case "drawRoutes":
            drawRoutes(msg.origin, msg.destination, msg.routes);
            break;
          case "selectRoute":
            selectRoute(msg.route);
            break;
        }
      };

      window.onload = function () {
        initMap();
      };
    </script>
  </body>
</html>
